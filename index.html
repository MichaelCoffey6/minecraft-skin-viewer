<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="content-type" content="text/html charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skin Viewer</title>
  <link rel="preload" href="./assets/Mojangles.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="./assets/title.png" as="image" type="image/png" crossorigin>
  <link rel="preload" href="./assets/grass.png" as="image" type="image/png" crossorigin>
  <link rel="preload" href="./assets/dirt.png" as="image" type="image/png" crossorigin>
  <style>
    @font-face {
      font-family: Minecraft;
      src: url('./assets/Mojangles.woff2')
    }
    
    * {
      box-sizing: border-box;
      font-family: Minecraft, Monospace;
      font-size: 18px;
    }
    
    html, body, #app {
      width: 100vw;
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
      margin: 0;
      padding: 0;
      align-items: center;
      background-image: url('./assets/grass.png'), url('./assets/dirt.png');
      background-size: 100px 100px;
      background-repeat: repeat-x, repeat;
      image-rendering: pixelated
    }
    
    #app {
      padding: 10px;
      display: grid;
      align-items: center;
      justify-content: center;
      grid-template-rows: 1fr auto auto 1fr;
      grid-template-columns: 1fr;
      grid-template-areas: '.' 'header' 'main' '.';
    }
    
    header {
      grid-area: header;
      height: 100%;
      width: calc(100% - 0px);
      text-align: center;
      align-content: end;
    }
    
    header img {
      max-width: 400px;
      width: 100%;
      object-fit: contain;
    }
    
    main {
      grid-area: main;
      overflow: hidden;
      width: 100%;
      max-width: 900px;
      max-height: 700px;
      height: 100%;
      background-color: #c6c6c6;
      padding: 10px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-content: start;
      align-items: start;
      justify-content: center;
      border-top: 4px solid white;
      border-left: 4px solid white;
      border-right: 4px solid #555;
      border-bottom: 4px solid #555;
      border-radius: 4px;
    }
    
    #viewer {
      width: 100%;
      height: calc(50% - 5px);
      max-height: calc(50% - 5px);
      object-fit: contain;
      border-top: 4px solid #555;
      border-left: 4px solid #555;
      border-right: 4px solid white;
      border-bottom: 4px solid white;
      border-radius: 4px;
      align-items: center;
      justify-content: center;
      display: flex;
      flex-wrap: wrap;
      padding: 0;
      background-image: url('./assets/stone.png');
      background-size: 100px 100px;
      image-rendering: pixelated;
    }
    
    #config {
      width: 100%;
      height: calc(50% - 5px);
      max-height: calc(50% - 5px);
      display: grid;
      justify-content: center;
      align-items: center;
      gap: 5px;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto auto 1fr;
      grid-template-areas: 
        'loadSkinBtn loadSkinBtn' 
        'bodyPartsBtn skinPartsBtn'
        'clotesPartsBtn skinPartsBtn'
        'animationBtn skinPartsBtn'
        '. skinPartsBtn'
    }
    
    #loadSkinBtn {
      grid-area: loadSkinBtn;
    }
    
    #bodyPartsBtn {
      grid-area: bodyPartsBtn;
    }
    
    #clotesPartsBtn {
      grid-area: clotesPartsBtn;
    }
    
    #skinPartsBtn {
      grid-area: skinPartsBtn;
      width: 100%;
      height: 100%;
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      display: grid;
      align-items: center;
      justify-content: center;
    }
    
    #animationBtn {
      grid-area: animationBtn;
    }
    
    #loadSkinBtn button {
      width: 100%;
    }
    
    .configBtn label { 
      width: 100%;
      background-color: #6f6f6f; 
      padding: 3px; 
      border: 3px outset #aaa; 
      color: white; 
      text-shadow: black 1px 1px; 
      display: inline-block;
      text-align: center;
      align-content: center;
      user-select: none;
    }
  	
  	.configBtn label.focus,
  	input[name="skinPartsChk"]:checked + label { 
  	  color: #c6c6c6; 
  	  background-color: #8b8b8b; 
  	  border: 3px inset #aaa;
  	}
    
    #animationBtn label::after {
      content: 'OFF';
    }
    
    #animationChk:checked + label::after {
      content: 'ON';
    }
    
    #canvas {
      opacity: 0;
      object-fit: contain;
    }
    
    #skinParts {
      display: grid;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    @media (width > 540px) {
      #viewer, #config {
        width: calc(50% - 5px);
        height: 100%;
        max-height: 100%;
      }
      
      #config {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto auto 1fr;
        grid-template-areas: 
          'loadSkinBtn loadSkinBtn' 
          'bodyPartsBtn clotesPartsBtn'
          'animationBtn animationBtn'
          'skinPartsBtn skinPartsBtn';
      }
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "@/": "./"
      }
    }
  </script>
  <script> const cl = (...log) => console.log(...log) </script>
  <script type="module">
    import "./app.js"
    import { viewer, config, camera, renderer } from "./src/const.js"
    import { onConfigBtnClick, onSkinPartClick } from "./src/onBtnClick.js"
    
    const onWindowResize = () => {
      if (canvas.width >= viewer.clientWidth) {
        canvas.style.width = `${viewer.clientWidth}px`
        canvas.style.height = ""
      } else if (canvas.height >= viewer.clientHeight) {
        canvas.style.width = ""
        canvas.style.height = `${viewer.clientHeight}px`
      } else if (viewer.clientWidth <= 250 / 400 * viewer.clientHeight) {
        canvas.style.width = "100%"
        canvas.style.height = ""
      } else if (viewer.clientHeight <= viewer.clientWidth / 250 * 400) {
        canvas.style.width = ""
        canvas.style.height = "100%"
      }
    }
    
    config.addEventListener('click', onConfigBtnClick)
    skinParts.addEventListener('click', onSkinPartClick)
    
    await Promise.all([
      document.fonts.ready,
      titleImg.decode()
    ])
    
    onWindowResize()
    canvas.style.opacity = 1
    
    window.addEventListener('resize', onWindowResize)
  </script>
  
</head>
<body>
  <div id="app">
    <div id="selectSkinType" style="position:absolute" hidden>
      <button id="selectClassicSkin">classic</button>
      <button id="selectSlimSkin">slim</button>
    </div>
  
    <header>
      <img src="./assets/title.png" alt="Minecraft Skin Editor logo" id="titleImg" />
    </header>
    
    <main id="main">
      <section id="viewer">
        <canvas id="canvas"></canvas>
      </section>
      
      <section id="config">
        <article id="loadSkinBtn" class="configBtn">
          <input id="loadSkinInp" name="skinPartsChk" type="file" accept="image/*" hidden />
          <label for="loadSkinInp">Load Skin</label>
        </article>
        
        <article id="bodyPartsBtn" class="configBtn">
          <input id="bodyPartsChk" name="skinPartsChk" type="radio" checked hidden />
          <label for="bodyPartsChk">Body Parts</label>
        </article>
        
        <article id="clotesPartsBtn" class="configBtn">
          <input id="clotesPartsChk" name="skinPartsChk" type="radio" hidden />
          <label for="clotesPartsChk">Clotes Parts</label>
        </article>
        
        <article id="animationBtn" class="configBtn">
          <input id="animationChk" type="checkbox" checked hidden />
          <label for="animationChk">Animation: </label>
        </article>
        
        <article id="skinPartsBtn" class="configBtn">
          <svg id="skinParts" viewbox="-0.5 -0.5 37 69" xmlns="http://www.w3.org/2000/svg">
            <path id="headPath" d="M12,3 24,3 24,15 12,15z" />
            <path id="bodyPath" d="M12,21 24,21 24,40 12,40z" />
            <path id="rightArmPath" d="M3,21 6,21 6,40 3,40z" />
            <path id="leftArmPath" d="M30,21 33,21 33,40 30,40z" />
            <path id="rightLegPath" d="M12,46 15,46 15,65 12,65z" />
            <path id="leftLegPath" d="M21,46 24,46 24,65 21,65z" />
            
            <path id="hatPath" class="clotes" data-body-part="headPath" d="M10,1 26,1 26,17 10,17z" />
            <path id="jacketPath" class="clotes" data-body-part="bodyPath" d="M10,19 26,19 26,42 10,42z" />
            <path id="rightSleevePath" class="clotes" data-body-part="rightArmPath" d="M1,19 8,19 8,42 1,42z" />
            <path id="leftSleevePath" class="clotes" data-body-part="leftArmPath" d="M28,19 35,19 35,42 28,42z" />
            <path id="rightPantsPath" class="clotes" data-body-part="rightLegPath" d="M10,44 17,44 17,67 10,67z" />
            <path id="leftPantsPath" class="clotes" data-body-part="leftLegPath" d="M19,44 26,44 26,67 19,67z" />
            
            <style>
              svg path {
                stroke: #555;
                fill: #555;
              }
              
              svg .clotes {
                fill: transparent;
              }
            </style>
          </svg>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
